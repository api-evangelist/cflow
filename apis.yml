description: >-
  Cflow is a cloud-based workflow automation platform that helps organizations
  streamline and optimize business processes. It offers a drag-and-drop
  workflow builder, customizable forms, rule-based routing, approval flows,
  integrations with popular business applications, and real-time analytics.
  Cflow exposes a REST API allowing developers to list workflows, submit and
  manage requests, approve or reject tasks, and manage users and roles
  programmatically.
apis:
  - aid: cflow:cflow
    name: Cflow Workflow API
    tags:
      - Approvals
      - Automation
      - Integrations
      - Protocols
      - Requests
      - Roles
      - Rules
      - Users
      - Workflows
    humanURL: https://www.cflowapps.com
    baseURL: https://us.cflowapps.com
    properties:
      - url: https://www.cflowapps.com/workflow/workflow-api/
        type: Documentation
      - url: openapi/cflow-openapi.yml
        type: OpenAPI
      - url: json-schema/workflow.json
        type: JSONSchema
      - url: json-schema/stage.json
        type: JSONSchema
      - url: json-schema/request.json
        type: JSONSchema
      - url: json-schema/user.json
        type: JSONSchema
      - url: json-schema/role.json
        type: JSONSchema
      - url: json-ld/cflow-context.jsonld
        type: JSONLD
    description: >-
      The Cflow Workflow API provides REST endpoints for retrieving workflows,
      creating and managing requests, approving or rejecting requests at each
      stage, creating draft requests, and administering users and roles. All
      business objects and integration objects are exposed as JSON resources
      and authentication is handled via API key, user key, and username
      headers.
