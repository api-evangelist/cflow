naftiko: 1.0.0-alpha2
info:
  label: Cflow API
  description: Cflow's business automation workflow offers REST APIs for applications, services, and programming components.
    The API provides a way to connect with external applications and update their data in Cflow's process automation engine.
    You can list workflows, initiate or approve requests, and manage users, roles, and permissions using the external REST
    API. All business objects and integration object structures are stored as REST API resources and are available in JSON
    or XML format.
  tags:
  - Cflow
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
