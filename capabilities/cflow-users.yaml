naftiko: 1.0.0-alpha2
info:
  label: Cflow API — Users
  description: 'Cflow API — Users. 2 operations. Lead operation: Cflow List Roles. Self-contained Naftiko capability covering
    one Cflow business surface.'
  tags:
  - Cflow
  - Users
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CFLOW_API_KEY: CFLOW_API_KEY
capability:
  consumes:
  - type: http
    namespace: cflow-users
    baseUri: https://us.cflowapps.com
    description: Cflow API — Users business capability. Self-contained, no shared references.
    resources:
    - name: integromat-api-cflow-roles
      path: /integromat/api/cflow/roles
      operations:
      - name: listroles
        method: GET
        description: Cflow List Roles
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: integromat-api-cflow-users
      path: /integromat/api/cflow/users
      operations:
      - name: listusers
        method: GET
        description: Cflow List Users
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: apikey
      value: '{{env.CFLOW_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: cflow-users-rest
    port: 8080
    description: REST adapter for Cflow API — Users. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/integromat/api/cflow/roles
      name: integromat-api-cflow-roles
      description: REST surface for integromat-api-cflow-roles.
      operations:
      - method: GET
        name: listroles
        description: Cflow List Roles
        call: cflow-users.listroles
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/integromat/api/cflow/users
      name: integromat-api-cflow-users
      description: REST surface for integromat-api-cflow-users.
      operations:
      - method: GET
        name: listusers
        description: Cflow List Users
        call: cflow-users.listusers
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: cflow-users-mcp
    port: 9090
    transport: http
    description: MCP adapter for Cflow API — Users. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: cflow-list-roles
      description: Cflow List Roles
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: cflow-users.listroles
      outputParameters:
      - type: object
        mapping: $.
    - name: cflow-list-users
      description: Cflow List Users
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: cflow-users.listusers
      outputParameters:
      - type: object
        mapping: $.
